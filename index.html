  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- SW health check: if React fails to mount within 6s, clear SW and reload -->
    <script>
      (function () {
        var TIMEOUT = 6000;
        var timer = setTimeout(function () {
          var root = document.getElementById('root');
          if (!root || !root.firstChild) {
            // React never mounted — stale SW likely serving broken chunks
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                var tasks = regs.map(function (r) { return r.unregister(); });
                return Promise.all(tasks);
              }).then(function () {
                // Clear all caches
                if ('caches' in window) {
                  return caches.keys().then(function (keys) {
                    return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                  });
                }
              }).then(function () {
                window.location.reload(true);
              }).catch(function () {
                window.location.reload(true);
              });
            } else {
              window.location.reload(true);
            }
          }
        }, TIMEOUT);

        // Cancel if React mounted successfully
        document.addEventListener('DOMContentLoaded', function () {
          var observer = new MutationObserver(function () {
            if (document.getElementById('root') && document.getElementById('root').firstChild) {
              clearTimeout(timer);
              observer.disconnect();
            }
          });
          observer.observe(document.getElementById('root') || document.body, { childList: true, subtree: true });
        });
      })();
    </script>

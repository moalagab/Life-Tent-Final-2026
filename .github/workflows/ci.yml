name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Unit tests + ESLint ─────────────────────────────────────────────────
  unit:
    name: Unit Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src --max-warnings 0

      - name: Typecheck (non-blocking — tracked debt, does not fail the build yet)
        run: npm run typecheck
        continue-on-error: true

      - name: Unit tests
        run: npx vitest run --reporter=verbose
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  # ── 2. Build check ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── 3. E2E tests (only when credentials are available) ────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    # Only run when secrets are configured
    if: ${{ vars.RUN_E2E == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Start preview server & run E2E
        run: |
          npx vite preview --port 8080 &
          sleep 3
          BASE_URL=http://localhost:8080 \
          TEST_EMAIL=${{ secrets.TEST_EMAIL }} \
          TEST_PASSWORD=${{ secrets.TEST_PASSWORD }} \
          START_SERVER=false \
          npx playwright test --config playwright.e2e.config.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report-e2e/
          retention-days: 14

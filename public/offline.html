<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>غير متصل — Life Tent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      padding: 1rem;
    }
    .card {
      text-align: center;
      max-width: 360px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #f1f5f9;
    }
    p {
      color: #94a3b8;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    button {
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      background: #FFB400;
      color: #0f0f1a;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>غير متصل بالإنترنت</h1>
    <p>يبدو أنك غير متصل. تحقق من اتصالك وحاول مجدداً.</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
  </div>
</body>
</html>
